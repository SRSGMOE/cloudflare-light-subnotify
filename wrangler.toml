name = "cloudflare-light-subnotify"
compatibility_date = "2024-12-01"

# 环境变量
[vars]
ADMIN_USERNAME = "admin"
ADMIN_PASSWORD = ""  # 请设置您的管理员密码

# Pages 配置
[pages]
build_command = "npm run build"
output_dir = "./dist"

# 注意：以下环境变量请在 Cloudflare 控制台配置
# 路径：Pages → Settings → Environment variables
#
# 必填变量：
# - ADMIN_USERNAME: 管理员用户名
# - ADMIN_PASSWORD: 管理员密码（加密）
#
# 定时任务相关：
# - API_PREFIX: 随机路径前缀（Secret 类型）
#   生成命令: openssl rand -hex 16
#   配置后 API 路径变为: /{API_PREFIX}/api/check-notifications
#   例如: /a1b2c3d4e5f6g7h8/api/check-notifications
#   需要与 Worker 中配置的 API_PREFIX 一致
#
# D1 数据库绑定：
# 路径：Pages → Settings → Functions → D1 database bindings
# Variable name: DB
# D1 database: 选择你创建的数据库