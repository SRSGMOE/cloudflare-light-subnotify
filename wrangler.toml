name = "cloudflare-light-subnotify"
compatibility_date = "2024-12-01"

[triggers]
crons = ["*/10 * * * *"]

# 环境变量
[vars]
ADMIN_USERNAME = "admin"
ADMIN_PASSWORD = ""  # 请在 Cloudflare 控制台设置

# Pages 配置
[pages]
build_command = "npm run build"
output_dir = "./dist"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "subnotify-db"
database_id = ""