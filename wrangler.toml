name = "cloudflare-light-subnotify"
compatibility_date = "2024-12-01"

# 环境变量
[vars]
ADMIN_USERNAME = "admin"
ADMIN_PASSWORD = ""  # 请设置您的管理员密码

# Pages 配置
[pages]
build_command = "npm run build"
output_dir = "./dist"

# 注意：D1 数据库绑定请在 Cloudflare 控制台配置
# 路径：Pages → Settings → Functions → D1 database bindings
# Variable name: DB
# D1 database: 选择你创建的数据库